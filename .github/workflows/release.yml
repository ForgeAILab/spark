name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

      - name: Verify all package.json versions match the tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Tag version: $TAG_VERSION"
          mismatch=0
          for pkg in packages/spark-schema packages/spark packages/create-spark; do
            PKG_NAME=$(jq -r .name "$pkg/package.json")
            PKG_VERSION=$(jq -r .version "$pkg/package.json")
            if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
              echo "::error::$PKG_NAME is at $PKG_VERSION but tag is v$TAG_VERSION"
              mismatch=1
            fi
          done
          exit $mismatch

      # npm trusted publishing (OIDC) needs the npm CLI >= 11.5.1. `bun publish`
      # does not support OIDC yet (oven-sh/bun#22423), so publish with npm.
      # setup-node provides a recent Node and a user-writable global prefix (so
      # `npm i -g` needs no sudo). No registry-url => no token .npmrc to conflict
      # with OIDC; npm defaults to registry.npmjs.org.
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Resolve workspace:* internal deps to the tag version
        run: |
          set -e
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          for pkg in packages/spark-schema packages/spark packages/create-spark; do
            tmp="$(mktemp)"
            jq --arg v "$TAG_VERSION" '
              if .dependencies then
                .dependencies |= with_entries(
                  if (.key | startswith("@forgeailab/")) and (.value == "workspace:*")
                  then .value = $v else . end)
              else . end
            ' "$pkg/package.json" > "$tmp"
            mv "$tmp" "$pkg/package.json"
          done

      - name: Publish to npm in topological order (OIDC trusted publishing)
        run: |
          set -e
          # spark-schema first (no internal deps), then spark (depends on schema),
          # finally create-spark (depends on schema + spark). v0.2.0 dropped the
          # libs/ runtime helpers, so only these three packages publish.
          for pkg in \
            packages/spark-schema \
            packages/spark \
            packages/create-spark; do
            PKG_NAME=$(jq -r .name "$pkg/package.json")
            PKG_VERSION=$(jq -r .version "$pkg/package.json")
            echo "::group::Publish $PKG_NAME@$PKG_VERSION"
            # Skip if already on the registry (lets us re-run after a partial failure).
            if npm view "$PKG_NAME@$PKG_VERSION" version > /dev/null 2>&1; then
              echo "Already published, skipping."
            else
              (cd "$pkg" && npm publish --access public)
            fi
            echo "::endgroup::"
          done

      - name: Summary
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          {
            echo "## Released v$TAG_VERSION"
            echo ""
            echo "| Package | Version |"
            echo "|---|---|"
            for pkg in packages/spark-schema packages/spark packages/create-spark; do
              PKG_NAME=$(jq -r .name "$pkg/package.json")
              PKG_VERSION=$(jq -r .version "$pkg/package.json")
              echo "| \`$PKG_NAME\` | \`$PKG_VERSION\` |"
            done
          } >> "$GITHUB_STEP_SUMMARY"
