name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

      - name: Verify all package.json versions match the tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Tag version: $TAG_VERSION"
          mismatch=0
          for pkg in packages/spark-schema packages/spark packages/create-spark libs/spark-*; do
            PKG_NAME=$(jq -r .name "$pkg/package.json")
            PKG_VERSION=$(jq -r .version "$pkg/package.json")
            if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
              echo "::error::$PKG_NAME is at $PKG_VERSION but tag is v$TAG_VERSION"
              mismatch=1
            fi
          done
          exit $mismatch

      - name: Configure npm auth for @forgeailab scope
        run: |
          cat > ~/.npmrc <<EOF
          //registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}
          @forgeailab:registry=https://registry.npmjs.org/
          always-auth=true
          EOF

      - name: Publish to npm in topological order
        run: |
          set -e
          # spark-schema first (no internal deps).
          # Then independent libs.
          # Then spark (depends on schema + state + skill-utils + board).
          # Finally create-spark (depends on schema + spark).
          for pkg in \
            packages/spark-schema \
            libs/spark-skill-utils \
            libs/spark-state \
            libs/spark-board \
            libs/spark-anthropic \
            libs/spark-auth-better-auth \
            libs/spark-sync-zero \
            libs/spark-stripe-helpers \
            packages/spark \
            packages/create-spark; do
            PKG_NAME=$(jq -r .name "$pkg/package.json")
            PKG_VERSION=$(jq -r .version "$pkg/package.json")
            echo "::group::Publish $PKG_NAME@$PKG_VERSION"
            # Skip if already on the registry (lets us re-run after a partial failure).
            if bunx npm view "$PKG_NAME@$PKG_VERSION" version > /dev/null 2>&1; then
              echo "Already published, skipping."
            else
              (cd "$pkg" && bun publish --access public)
            fi
            echo "::endgroup::"
          done

      - name: Summary
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          {
            echo "## Released v$TAG_VERSION"
            echo ""
            echo "| Package | Version |"
            echo "|---|---|"
            for pkg in packages/spark-schema packages/spark packages/create-spark libs/spark-*; do
              PKG_NAME=$(jq -r .name "$pkg/package.json")
              PKG_VERSION=$(jq -r .version "$pkg/package.json")
              echo "| \`$PKG_NAME\` | \`$PKG_VERSION\` |"
            done
          } >> "$GITHUB_STEP_SUMMARY"
