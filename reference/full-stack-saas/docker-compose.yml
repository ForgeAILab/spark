services:
  postgres:
    image: postgres:16-alpine
    container_name: spark-ref-postgres
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    environment:
      POSTGRES_USER: spark
      POSTGRES_PASSWORD: spark
      POSTGRES_DB: spark
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spark -d spark"]
      interval: 2s
      timeout: 5s
      retries: 30

  zero-cache:
    image: rocicorp/zero:latest
    container_name: spark-ref-zero
    environment:
      ZERO_UPSTREAM_DB: postgres://spark:spark@postgres:5432/spark
      ZERO_CVR_DB: postgres://spark:spark@postgres:5432/spark_cvr
      ZERO_CHANGE_DB: postgres://spark:spark@postgres:5432/spark_change
      ZERO_REPLICA_FILE: /zero/replica.db
      ZERO_AUTH_SECRET: zero-reference-secret-change-me
      ZERO_ADMIN_PASSWORD: zero-reference-admin-change-me
      ZERO_PUSH_URL: http://host.docker.internal:3010/api/zero/mutate # assumes `bun --bun next dev -p 3010`
      ZERO_LOG_LEVEL: info
      ZERO_NUM_SYNC_WORKERS: "1"
    ports:
      - "4848:4848"
    volumes:
      - zerodata:/zero
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  zerodata:
